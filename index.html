<h1 id="a.-manual-ticket-inventory-management">17A. Manual Ticket

<h2 id="a.1-purpose">17A.1 Purpose</h2>

<h1 id="c.-incentives-allowances">17C. Incentives &amp; Allowances</h1>
<h2 id="c.1-purpose">17C.1 Purpose</h2>
<p>Compute conductor and driver incentives (bata) and all other
allowances based on total collection and operated trips. All rates must
be configurable by Super Admin in Control-Centre.</p>
<h2 id="c.2-collection-bata">17C.2 Collection Bata</h2>
<ul>
<li>Fixed percentage of total collection</li>
<li>Rate is configurable in Control-Centre master config</li>
<li>Computed separately for conductor and driver</li>
<li>Included in challan as conductor &amp; driver batta split</li>
</ul>
<h2 id="c.3-trip-based-allowances">17C.3 Trip-based Allowances</h2>
<ul>
<li>Other allowances (non-collection-based) are fixed per operated
trip</li>
<li>Rates configurable in master config</li>
</ul>
<h2 id="c.4-overtime-allowance">17C.4 Overtime Allowance</h2>
<ul>
<li>Applicable if trip duration exceeds 3 hours (maximum cap: 3 hours
OT)</li>
<li>Rate computed as per-hour rate derived from basic wages</li>
<li>Formula: <code>OT Hours × (Basic Wages ÷ Standard Hours)</code></li>
</ul>
<h2 id="c.5-double-duty-week-off-allowance">17C.5 Double Duty / Week-off
Allowance</h2>
<ul>
<li>Applicable when duty is 16 continuous hours (duty rest
scenario)</li>
<li>Double wages applicable for such duties</li>
<li>Week-off duty also qualifies for double wages</li>
</ul>
<h2 id="c.6-ncmc-card-issuance-bata">17C.6 NCMC Card Issuance Bata</h2>
<ul>
<li>Per 100 NCMC cards issued: ₹10 bata</li>
<li>Added to remittance computation</li>
</ul>
<h2 id="c.7-master-config">17C.7 Master Config</h2>
<ul>
<li>All wages and allowances rates maintained as master config in
Control-Centre</li>
<li>Accessible and editable only by Super Admin</li>
<li>Applies globally across all depots</li>
</ul>
<h2 id="c.8-remittance-formula">17C.8 Remittance Formula</h2>
<p><code>Remit = Total Collection − Allowances</code></p>
<ul>
<li>Total collection includes: digital ETM sales + manual ticket sales +
NCMC top-up</li>
<li>NCMC card issuance bata and NCMC top-up amounts added to
remittance</li>
<li>Impress amount (initial change given to conductor) deducted from
final audit total</li>
</ul>

function buildSections(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const nodes = Array.from(doc.body.childNodes);

  // Group content under each H1
  const sections = [];
  let current = null;

  nodes.forEach(node => {
    if (node.nodeType === 1 && node.tagName === 'H1') {
      current = { title: node.textContent.trim(), nodes: [] };
      sections.push(current);
    } else if (current) {
      current.nodes.push(node.cloneNode(true));
    }
  });

  return sections;
}

function injectModuleStatus(container, sidebar) {
  const statusCard = document.createElement('div');

  statusCard.id = 'sec-status';

  const mtcTotal = MODULE_STATUS.filter(m => m.clients.includes('MTC, Chennai')).length;
  const pct = Math.round((mtcBuilt / mtcTotal) * 100);

  const CLIENTS = [...new Set(MODULE_STATUS.flatMap(m => m.clients))];

  function statusBadge(s) {
    const map = {
      built:     ['#dcfce7','#16a34a','✓ Built'],
      pending:   ['#fef9c3','#92400e','⏳ To Build'],
      available: ['#dbeafe','#1d4ed8','✔ Available'],
      doable:    ['#ede9fe','#6d28d9','🔧 Doable'],
      clarify:   ['#ffedd5','#c2410c','❓ Need Clarity'],
    };
    const [bg, col, label] = map[s] || ['#f3f4f6','#374151', s];
    return `<span style="background:${bg};color:${col};padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap">${label}</span>`;
  }

  function clientBadge(c) {
    const colors = { 'MTC, Chennai': ['#fce7f3','#9d174d'], 'PM-e-seva, NCR': ['#e0f2fe','#0369a1'] };

  function buildRows(filter) {

      <td><strong>${m.module}</strong></td>

  const body = document.createElement('div');
  body.className = 'section-body open';

        <div style="background:linear-gradient(90deg,#6c7cff,#22c55e);width:${pct}%;height:100%;border-radius:99px;transition:width 1s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#9aa3c0;margin-top:6px">
        <span>${mtcBuilt} modules built</span><span>${mtcTotal - mtcBuilt} modules pending</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap" id="client-filters">

      ${CLIENTS.map(c => `<button onclick="filterModules('${c}',this)" style="background:white;color:#4a5568;border:1px solid #d0d8f0;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer">${c}</button>`).join('')}

  sidebar.insertBefore(divider, link.nextSibling);
}

function getBaseNum(secNum) {
  // "13.1" → "13", "13.6A" → "13", "17A" → "17", "13" → null (is parent)
  const dotMatch = secNum.match(/^(\d+)\./);
  if (dotMatch) return dotMatch[1];
  const letterMatch = secNum.match(/^(\d+)[A-Z]/);
  if (letterMatch) return letterMatch[1];
  return null;
}

function groupSections(sections) {
  const parents = [];
  const parentMap = {};

  sections.forEach(sec => {
    const numMatch = sec.title.match(/^(\d+[\w.]*)/);
    const secNum = numMatch ? numMatch[1] : null;
    sec.secNum = secNum;
    sec.children = [];

    const base = secNum ? getBaseNum(secNum) : null;
    if (base && parentMap[base]) {
      parentMap[base].children.push(sec);
    } else {
      parents.push(sec);
      if (secNum) parentMap[secNum] = sec;
    }
  });

  return parents;
}

function renderSections(sections) {
  const container = document.getElementById('content');
  const sidebar = document.getElementById('sidebar');
  container.innerHTML = '';
  sidebar.innerHTML = '<h2>Contents</h2>';

  const SKIP_TITLES = ['26', '27', '28'];
  // Skip first 2 (doc title + platform name)
  const filtered = sections.slice(2).filter(s => {
    const num = (s.title.match(/^(\d+)/) || [])[1];
    return !SKIP_TITLES.includes(num);
  });
  const grouped = groupSections(filtered);

  grouped.forEach(sec => {
    const secNum = sec.secNum || '?';
    const id = 'sec-' + secNum.replace(/\./g, '-').replace(/[A-Z]/g, m => '-' + m);
    const titleText = sec.title.replace(/^\d+[\w.]*\s*[.\-–]?\s*/, '');

    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = id;

    const btn = document.createElement('button');
    btn.className = 'section-toggle';
    btn.innerHTML = `
      <span class="toggle-title">
        <span class="sec-num">${secNum}</span>
        ${titleText}
      </span>
      <span class="chevron">&#8964;</span>`;

    const body = document.createElement('div');
    body.className = 'section-body';

    // Parent's own content
    sec.nodes.forEach(n => body.appendChild(n.cloneNode(true)));

    // Nested sub-sections
    if (sec.children.length > 0) {
      const subsWrap = document.createElement('div');
      subsWrap.style.marginTop = '12px';

      sec.children.forEach(child => {
        const childNum = child.secNum;
        const childTitle = child.title.replace(/^\d+[\w.]*\s*[.\-–]?\s*/, '');
        const subId = 'sec-' + childNum.replace(/\./g, '-');

        const sub = document.createElement('div');
        sub.className = 'sub-section';
        sub.id = subId;

        const subBtn = document.createElement('button');
        subBtn.className = 'sub-toggle';
        subBtn.innerHTML = `
          <span class="sub-num">${childNum}</span>
          <span class="sub-title">${childTitle}</span>
          <span class="sub-chevron">&#8964;</span>`;

        const subBody = document.createElement('div');
        subBody.className = 'sub-body';
        child.nodes.forEach(n => subBody.appendChild(n.cloneNode(true)));

        subBtn.addEventListener('click', () => {
          const isOpen = subBody.classList.toggle('open');
          subBtn.classList.toggle('open', isOpen);
        });

        sub.appendChild(subBtn);
        sub.appendChild(subBody);
        subsWrap.appendChild(sub);
      });

      body.appendChild(subsWrap);
    }

    btn.addEventListener('click', () => {
      const isOpen = body.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
    });

    card.appendChild(btn);
    card.appendChild(body);
    container.appendChild(card);

    // Sidebar — parent link
    const link = document.createElement('a');
    link.href = '#' + id;
    link.textContent = sec.title;
    link.addEventListener('click', (e) => {
      e.preventDefault();
      if (!body.classList.contains('open')) {
        body.classList.add('open');
        btn.classList.add('open');
      }
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    sidebar.appendChild(link);

    // Sidebar — child links indented
    sec.children.forEach(child => {
      const childId = 'sec-' + child.secNum.replace(/\./g, '-');
      const cl = document.createElement('a');
      cl.href = '#' + childId;
      cl.className = 'sub';
      cl.textContent = child.title;
      cl.addEventListener('click', (e) => {
        e.preventDefault();
        // Open parent first
        if (!body.classList.contains('open')) {
          body.classList.add('open');
          btn.classList.add('open');
        }
        // Open child
        const subEl = document.getElementById(childId);
        if (subEl) {
          const sb = subEl.querySelector('.sub-body');
          const sbtn = subEl.querySelector('.sub-toggle');
          if (sb && !sb.classList.contains('open')) {
            sb.classList.add('open');
            sbtn.classList.add('open');
          }
          subEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
      sidebar.appendChild(cl);
    });
  });

  // Inject module status card at top
  injectModuleStatus(container, sidebar);

  // Auto-open executive summary
  const cards = container.querySelectorAll('.section-card');
  if (cards[1]) {
    cards[1].querySelector('.section-body').classList.add('open');
    cards[1].querySelector('.section-toggle').classList.add('open');
  }
}

  const clientBadges = m.clients.map(c => {
    const [cbg, ccol] = clientColors[c] || ['#f3f4f6','#374151'];
    return `<span style="background:${cbg};color:${ccol};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block;margin:1px">${c}</span>`;
  }).join('');
  return `<tr>
    <td><strong>${m.module}</strong></td>
    <td><code style="font-size:12px">${m.path}</code></td>
    <td>${clientBadges}</td>
    <td><span style="background:${sbg};color:${scol};padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap">${slabel}</span></td>
    <td style="font-size:13px;color:#6b7280">${m.notes}</td>
  </tr>`;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.section-body').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.section-toggle').forEach(b => b.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.section-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.section-toggle').forEach(b => b.classList.remove('open'));
}

// Highlight active sidebar link on scroll
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      document.querySelectorAll('#sidebar a').forEach(a => a.classList.remove('active'));
      const active = document.querySelector(`#sidebar a[href="#${entry.target.id}"]`);
      if (active) { active.classList.add('active'); active.scrollIntoView({ block: 'nearest' }); }
    }
  });
}, { threshold: 0.2 });

window.addEventListener('load', () => {
  const sections = buildSections(rawHTML);
  renderSections(sections);
  document.querySelectorAll('.section-card').forEach(c => observer.observe(c));
});
</script>
</body>
</html>
